name: C to Python Compiler

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run C to Python Compiler
        run: |
          python main.py input/sample.c output/sample.py

      - name: Show Generated Python Code
        run: |
          cat output/sample.py

      - name: Upload Generated File
        uses: actions/upload-artifact@v4
        with:
          name: generated-python-code
          path: output/sample.py
